services:
  # ── Web Service (FastAPI backend + frontend static files) ──────────────────
  - type: web
    name: twitter-scheduler
    runtime: python
    region: singapore          # closest to Japan
    plan: starter              # $7/month — required for persistent disk
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/scheduler.db
      - key: ANTHROPIC_API_KEY
        sync: false            # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health

  # ── Optional: separate Cron Job to retry failed posts ─────────────────────
