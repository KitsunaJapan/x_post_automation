services:
  - type: web
    name: twitter-scheduler
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/scheduler.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.1"
    healthCheckPath: /health
